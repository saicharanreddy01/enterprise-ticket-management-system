# Test environment — uses H2 so tests run anywhere without MySQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Dummy credentials for test context
app.security.dev.username=dev_user
app.security.dev.password=dev123
app.security.admin.username=admin_user
app.security.admin.password=admin123

# This is a dummy secret ONLY used to bypass automated tests.
# It is never used in the real application.
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refreshExpiration=604800000