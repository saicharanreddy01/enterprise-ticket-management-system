<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Ticketmaster</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .login-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header h1 {
            font-size: 24px;
            font-weight: 400;
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .auth-header p {
            font-size: 16px;
            font-weight: 400;
            color: var(--g-text-main);
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 48px;
        }

        #loginError {
            display: none;
            color: var(--g-red);
            font-size: 14px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<div class="ethereal-bg"></div>

<div class="login-wrapper">
    <div class="g-card">

        <div class="auth-header">
            <span class="material-symbols-rounded" style="color: var(--g-blue); font-size: 36px;">confirmation_number</span>
            <h1>Sign in</h1>
            <p>Use your Enterprise Account</p>
        </div>

        <div id="errorContainer" style="display: none; margin-bottom: 24px;">
            <div style="display: flex; align-items: center; gap: 12px; color: var(--g-red); font-size: 14px;">
                <span class="material-symbols-rounded" style="font-size: 20px;">error</span>
                <span id="errorMessage">Invalid credentials.</span>
            </div>
        </div>

        <div class="g-input-group">
            <input type="text" id="username" placeholder=" " required autocomplete="off">
            <label for="username">Enterprise Username</label>
        </div>

        <div class="g-input-group" style="margin-bottom: 8px;">
            <input type="password" id="password" placeholder=" " required autocomplete="off">
            <label for="password">Enter your password</label>
        </div>

        <div class="action-row">
            <a href="#" style="color: var(--g-blue); text-decoration: none; font-weight: 500; font-size: 14px;">Forgot password?</a>
            <button class="g-btn g-btn-primary" onclick="login()">Next</button>
        </div>

    </div>
</div>

<script>
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') login();
    });

    async function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errContainer = document.getElementById('errorContainer');
        const errMessage = document.getElementById('errorMessage');

        errContainer.style.display = 'none';

        if (!user || !pass) {
            errMessage.innerText = "Enter a username and password.";
            errContainer.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include', // ← allows browser to receive and store HttpOnly cookies
                body: JSON.stringify({ username: user, password: pass })
            });

            if (response.ok) {
                const data = await response.json();
                // Tokens are now in HttpOnly cookies — never touch them from JS
                // Only store non-sensitive display data in localStorage
                localStorage.setItem('jwt_username', data.username);
                localStorage.setItem('jwt_role', data.role);
                window.location.href = '/index.html';
            } else {
                errMessage.innerText = "Wrong password. Try again.";
                errContainer.style.display = 'block';
            }
        } catch (error) {
            errMessage.innerText = "Couldn't connect to server.";
            errContainer.style.display = 'block';
        }
    }
</script>
</body>
</html>
