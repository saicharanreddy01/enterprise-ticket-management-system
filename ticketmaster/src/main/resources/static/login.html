<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketmaster Portal - Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #F3F4F6; font-family: 'Roboto', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; border: 1px solid #DADCE0; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px; }
        .btn-google { background-color: #4F46E5; color: white; border: none; font-weight: 500; }
        .btn-google:hover { background-color: #4338CA; color: white; }
    </style>
</head>
<body>

<div class="login-card shadow-sm">
    <div class="text-center mb-4">
        <h4 class="fw-bold text-dark m-0">Ticketmaster</h4>
        <span class="text-muted small">Enterprise Access Management Gateway</span>
    </div>

    <div class="mb-3">
        <label class="form-label small fw-semibold text-secondary">Username</label>
        <input type="text" id="username" class="form-control" placeholder="e.g., dev_user" required>
    </div>
    <div class="mb-4">
        <label class="form-label small fw-semibold text-secondary">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
    </div>
    <div id="errorMsg" class="text-danger small mb-3 text-center" style="display:none"></div>
    <button onclick="login()" class="btn btn-google w-100 py-2 rounded fw-semibold">Sign In</button>

</div>

<script>
    // If already logged in, skip login page
    if (localStorage.getItem('jwt_token')) {
        window.location.href = '/index.html';
    }

    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('errorMsg');

        if (!username || !password) {
            errorMsg.textContent = 'Please enter username and password.';
            errorMsg.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                const data = await response.json();
                // Store token and user info in localStorage
                localStorage.setItem('jwt_token', data.token);
                localStorage.setItem('jwt_refresh_token', data.refreshToken);
                localStorage.setItem('jwt_username', data.username);
                localStorage.setItem('jwt_role', data.role);
                // Redirect to dashboard
                window.location.href = '/index.html';
            } else {
                errorMsg.textContent = 'Invalid username or password.';
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            errorMsg.textContent = 'Connection error. Is the server running?';
            errorMsg.style.display = 'block';
        }
    }

    // Allow pressing Enter to submit
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });
</script>

</body>
</html>
