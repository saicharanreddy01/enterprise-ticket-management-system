<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketmaster Enterprise</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            position: absolute;
            top: 0; left: 0; width: 100%;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 500;
            color: var(--g-text-main);
            text-decoration: none;
        }

        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 0 24px;
        }

        .hero-title {
            font-size: clamp(3rem, 7vw, 5.5rem);
            font-weight: 400;
            letter-spacing: -0.04em; /* The Google Display Type signature */
            line-height: 1.05;
            color: var(--g-text-main);
            margin-bottom: 24px;
            max-width: 900px;
            animation: slideUpFade 1s cubic-bezier(0.2, 0, 0, 1) forwards;
        }

        .text-gradient {
            background: linear-gradient(100deg, var(--g-blue) 0%, #A142F4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 20px;
            color: var(--g-text-muted);
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 48px;
            animation: slideUpFade 1s cubic-bezier(0.2, 0, 0, 1) 0.1s forwards;
            opacity: 0;
        }

        .cta-container {
            animation: slideUpFade 1s cubic-bezier(0.2, 0, 0, 1) 0.2s forwards;
            opacity: 0;
        }

        .g-btn-large {
            height: 56px;
            padding: 0 36px;
            font-size: 16px;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="ethereal-bg"></div>

<nav class="nav-bar">
    <a href="#" class="logo-area">
        <span class="material-symbols-rounded" style="color: var(--g-blue); font-size: 28px;">confirmation_number</span>
        Ticketmaster
    </a>
    <div style="display: flex; gap: 8px;">
        <button class="g-btn g-btn-text" onclick="window.location.href='/login.html'">Sign in</button>
        <button class="g-btn g-btn-primary" onclick="window.location.href='/login.html'">Try Ticketmaster</button>
    </div>
</nav>

<main class="hero-section">
    <h1 class="hero-title">Service management, <br><span class="text-gradient">reimagined.</span></h1>
    <p class="hero-subtitle">Automated routing, strict SLA enforcement, and a pristine workspace. Your IT infrastructure, handled effortlessly.</p>

    <div class="cta-container">
        <button class="g-btn g-btn-primary g-btn-large" onclick="window.location.href='/login.html'">
            Go to Workspace
        </button>
    </div>
</main>

</body>
</html>
