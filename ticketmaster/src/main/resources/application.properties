spring.application.name=ticketmaster

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/ticketmaster_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration (Access = 15 mins, Refresh = 24 hours)
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refreshExpiration=86400000

# Email configuration — using Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Display name shown in the From field
app.mail.from=${MAIL_USERNAME}
app.mail.notify=${MAIL_NOTIFY_EMAIL}