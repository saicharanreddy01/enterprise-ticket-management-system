spring.application.name=ticketmaster

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/ticketmaster_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration (Access = 15 mins, Refresh = 24 hours)
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refreshExpiration=86400000
